openapi: 3.0.3
info:
  title: Wacht Frontend API - Workspaces
  description: Workspace management endpoints for the Wacht Frontend API
  version: 1.0.0
servers:
- url: https://api.wacht.dev
  description: Production server

tags:
- name: Workspaces
  description: Workspace CRUD operations
- name: Workspace Members
  description: Workspace member management
- name: Workspace Roles
  description: Workspace role management

paths:
  /workspaces:
    post:
      tags:
      - Workspaces
      summary: Create workspace
      description: Create a new workspace within an organization
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - name
              - organization_id
              properties:
                name:
                  type: string
                  description: Workspace name
                  example: "Engineering"
                description:
                  type: string
                  description: Workspace description
                  example: "Engineering team workspace"
                organization_id:
                  type: string
                  format: uint64
                  description: Parent organization ID
                  example: "123456789012345678"
                image:
                  type: string
                  format: binary
                  description: Workspace profile image
      responses:
        '200':
          description: Workspace created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    type: object
                    properties:
                      workspace:
                        $ref: '#/components/schemas/Workspace'
                      membership:
                        $ref: '#/components/schemas/WorkspaceMembership'
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    nullable: true
                    description: Error details (null on success)
        '400':
          description: Bad request - Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Bad request - Invalid input
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 401
                  message:
                    type: string
                    description: Unauthorized
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '403':
          description: Forbidden - Not a member of organization or workspace limit reached
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 403
                  message:
                    type: string
                    description: Forbidden - Not a member of organization or workspace limit reached
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '404':
          description: Organization not found

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 404
                  message:
                    type: string
                    description: Organization not found
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
