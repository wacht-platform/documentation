openapi: 3.0.3
info:
  title: Wacht Frontend API - Notifications
  description: User notification management endpoints
  version: 1.0.0
servers:
- url: https://api.wacht.dev
  description: Production server

tags:
- name: Notifications
  description: User notification management

paths:
  /notifications:
    get:
      tags:
      - Notifications
      summary: List notifications
      description: |
        Retrieve notifications for the current user with cursor-based pagination.

        By default, archived notifications are not returned. Use `is_archived=true` to include them.

        Scopes:
        - `user`: Personal notifications
        - `organization`: Organization-scoped notifications (requires `scope_id`)
        - `workspace`: Workspace-scoped notifications (requires `scope_id`)
      security:
      - cookieAuth: []
      parameters:
      - name: limit
        in: query
        description: Maximum number of notifications to return
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: cursor
        in: query
        description: |
          Cursor for pagination. Use the ID of the last notification from the previous page
          to get the next set of results. Notifications are returned in descending order by ID.
        schema:
          type: string
          format: uint64
          example: "123456789012345678"
      - name: scope
        in: query
        description: Filter by scope (user, organization, workspace)
        schema:
          type: string
          enum: [user, organization, workspace]
          example: "organization"
      - name: scope_id
        in: query
        description: Filter by scope ID (required when scope is organization or workspace)
        schema:
          type: string
          format: uint64
      - name: is_read
        in: query
        description: Filter by read status
        schema:
          type: boolean
      - name: is_starred
        in: query
        description: Filter by starred status
        schema:
          type: boolean
      - name: is_archived
        in: query
        description: Filter by archived status. Default is false (excludes archived).
        schema:
          type: boolean
      - name: severity
        in: query
        description: Filter by notification severity
        schema:
          type: string
          enum: [info, success, warning, error]
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    type: object
                    properties:
                      notifications:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
                      has_more:
                        type: boolean
                        description: Whether more results are available
                        example: false
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    nullable: true
                    description: Error details (null on success)
        '401':
          description: Unauthorized

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 401
                  message:
                    type: string
                    description: Unauthorized
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
