  /workspaces/{id}:
    parameters:
    - name: id
      in: path
      required: true
      description: Workspace ID
      schema:
        type: string
        format: uint64

  /workspaces/{id}/update:
    post:
      tags:
      - Workspaces
      summary: Update workspace
      description: Update workspace details
      security:
      - cookieAuth: []
      parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: Workspace name
                  example: "Engineering Team"
                description:
                  type: string
                  description: Workspace description
                  example: "Updated workspace description"
                enforce_2fa:
                  type: boolean
                  description: Enforce MFA setup for members
                  example: false
                enable_ip_restriction:
                  type: boolean
                  description: Enable IP restriction
                  example: false
                whitelisted_ips:
                  type: array
                  items:
                    type: string
                  description: Allowed IP addresses/CIDR ranges
                  example: ["192.168.1.0/24", "10.0.0.1"]
      responses:
        '200':
          description: Workspace updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
