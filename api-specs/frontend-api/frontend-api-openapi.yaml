openapi: 3.0.3
info:
  title: Wacht Frontend API - Authentication
  description: Authentication endpoints for the Wacht Frontend API
  version: 1.0.0
servers:
- url: https://api.wacht.dev
  description: Production server

tags:
- name: Authentication
  description: User authentication and authorization endpoints

paths:
  /auth/signin:
    post:
      tags:
      - Authentication
      summary: Sign in a user
      description: Authenticate a user using various strategies (email OTP, phone OTP, magic link, username/password, 
        email/password)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - strategy
              properties:
                username:
                  type: string
                  description: Username for username/password login
                  example: "johndoe"
                email:
                  type: string
                  format: email
                  description: Email for email/password or email OTP login
                  example: "john@example.com"
                phone:
                  type: string
                  description: Phone number for phone OTP login
                  example: "+1234567890"
                phone_country_code:
                  type: string
                  description: Country code for phone number
                  example: "+1"
                password:
                  type: string
                  format: password
                  description: Password for username/password or email/password login
                  example: "SecurePass123!"
                strategy:
                  type: string
                  enum: [email_otp, phone_otp, magic_link, plain_username, plain_email]
                  description: Authentication strategy
                token:
                  type: string
                  description: Token for certain authentication methods
      responses:
        '200':
          description: Successful sign in
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    $ref: '#/components/schemas/Session'
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    nullable: true
                    description: Error details (null on success)
        '400':
          description: Bad request - Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Bad request - Invalid input
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 401
                  message:
                    type: string
                    description: Unauthorized - Invalid credentials
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 500
                  message:
                    type: string
                    description: Internal server error
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
  /auth/signup:
    post:
      tags:
      - Authentication
      summary: Sign up a new user
      description: Create a new user account
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - email
              properties:
                first_name:
                  type: string
                  description: User's first name
                  example: "John"
                last_name:
                  type: string
                  description: User's last name
                  example: "Doe"
                username:
                  type: string
                  description: Desired username
                  example: "johndoe"
                email:
                  type: string
                  format: email
                  description: User's email address
                  example: "john@example.com"
                phone_number:
                  type: string
                  description: User's phone number
                  example: "+1234567890"
                phone_country_code:
                  type: string
                  description: Country code for phone number
                  example: "+1"
                password:
                  type: string
                  format: password
                  description: Desired password
                  example: "SecurePass123!"
                invite_token:
                  type: string
                  description: Optional invite token
                  example: "inv_123456"
      responses:
        '200':
          description: Successful sign up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    $ref: '#/components/schemas/Session'
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    nullable: true
                    description: Error details (null on success)
        '400':
          description: Bad request - Invalid input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Bad request - Invalid input or user already exists
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 500
                  message:
                    type: string
                    description: Internal server error
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
  /auth/forgot-password:
    post:
      tags:
      - Authentication
      summary: Initiate password reset
      description: Send a password reset email to the user
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
                  description: User's email address
                  example: "john@example.com"
                otp:
                  type: string
                  description: OTP code for verification
                  example: "123456"
      responses:
        '200':
          description: Password reset email sent or OTP verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: Password reset token (if OTP verified)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    nullable: true
                    description: Error details (null on success)
        '400':
          description: Bad request - Invalid email
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Bad request - Invalid email
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 404
                  message:
                    type: string
                    description: User not found
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '500':
          description: Internal server error

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 500
                  message:
                    type: string
                    description: Internal server error
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
  /auth/reset-password:
    post:
      tags:
      - Authentication
      summary: Reset password with token
      description: Reset user's password using the token from the reset email
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - token
              - password
              properties:
                token:
                  type: string
                  description: Password reset token from email
                  example: "reset_token_abc123"
                password:
                  type: string
                  format: password
                  description: New password
                  example: "NewSecurePass456!"
      responses:
        '200':
          description: Password successfully reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    $ref: '#/components/schemas/Session'
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
