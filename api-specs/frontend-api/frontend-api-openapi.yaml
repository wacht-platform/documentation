  /auth/identifier-availability:
    get:
      tags:
      - Authentication
      summary: Check identifier availability
      description: Check if username or email is available
      parameters:
      - name: identifier
        in: query
        required: true
        description: Username or email to check
        schema:
          type: string
      - name: type
        in: query
        description: Type of identifier
        schema:
          type: string
          enum: [username, email]
      responses:
        '200':
          description: Availability status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    type: object
                    properties:
                      exists:
                        description: Whether the identifier exists
                        type: boolean
                        example: true
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
