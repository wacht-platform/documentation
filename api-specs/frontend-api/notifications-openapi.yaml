                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
components:
  schemas:
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Notification ID
          example: "123456789012345678"
        deployment_id:
          type: string
          format: uint64
          description: Deployment ID
          example: "111111111111111111"
        user_id:
          type: string
          format: uint64
          description: User ID
          example: "777777777777777777"
        organization_id:
          type: string
          format: uint64
          description: Organization ID (if organization-scoped)
          example: "888888888888888888"
          nullable: true
        workspace_id:
          type: string
          format: uint64
          description: Workspace ID (if workspace-scoped)
          example: "999999999999999999"
          nullable: true
        title:
          type: string
          description: Notification title
          example: "New organization invitation"
        body:
          type: string
          description: Notification body
          example: "You have been invited to join Acme Corp"
        ctas:
          type: array
          description: Call-to-action buttons
          items:
            $ref: '#/components/schemas/NotificationCTA'
        severity:
          type: string
          description: Notification severity level
          enum: [info, success, warning, error]
          example: "info"
        is_read:
          type: boolean
          description: Whether the notification has been read
          example: false
        read_at:
          type: string
          format: date-time
          description: Timestamp when the notification was read
          example: "2024-01-15T11:00:00Z"
          nullable: true
        is_archived:
          type: boolean
          description: Whether the notification has been archived
          example: false
        archived_at:
          type: string
          format: date-time
          description: Timestamp when the notification was archived
          example: "2024-01-15T12:00:00Z"
          nullable: true
        is_starred:
          type: boolean
          description: Whether the notification has been starred
          example: false
        metadata:
          type: object
          description: Additional metadata
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp (expired notifications are hidden)
          example: "2024-02-15T10:30:00Z"
          nullable: true

    NotificationCTA:
      type: object
      description: Call-to-action button for notifications
      properties:
        label:
          type: string
          description: Button label
          example: "View Invitation"
        payload:
          type: object
          description: Action payload (varies by notification type)
          additionalProperties: true
          example:
            url: "https://app.wacht.dev/invitations/123"

    SessionInfo:
      type: object
      description: Minimal session info included in every response
      nullable: true
      properties:
        id:
          type: string
          description: Session ID
          example: '123456789012345678'
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Session last update timestamp
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: INVALID_CREDENTIALS
        message:
          type: string
          description: Human-readable error message
          example: Invalid credentials. Please try again.
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session-based authentication using cookies
