openapi: 3.0.3
info:
  title: Wacht Backend API - User Profiles
  description: |
    Complete API for managing user profiles, authentication, and user data.

    ## Authentication

    All requests require API key authentication using the `Authorization` header:

    ```
    Authorization: Bearer {your_api_key}
    ```

    ## Pagination

    List endpoints return paginated responses with the following structure:

    ```json
    {
      "data": [...],
      "has_more": true,
      "limit": 10,
      "offset": 0
    }
    ```

    - `data`: Array of results
    - `has_more`: Whether there are more results available
    - `limit`: Number of items per page (only included if explicitly set)
    - `offset`: Number of items skipped (only included if explicitly set)
  version: 1.0.0

servers:
- url: https://api.wacht.dev
  description: Production server

security:
- ApiKeyAuth: []

tags:
- name: Users
  description: User profile and authentication management
- name: User Emails
  description: User email address management
- name: User Phones
  description: User phone number management
- name: User Social Connections
  description: Social account management
- name: Invitations
  description: User invitation management
- name: Waitlist
  description: Waitlist user management
- name: Session Tickets
  description: Session ticket generation for backend authentication

paths:
  /users:
    get:
      summary: List users
      description: Get a paginated list of all active users in the deployment
      tags:
        - Users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items to return per page
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of items to skip
        - name: sort_key
          in: query
          schema:
            type: string
            enum: [created_at, email, first_name, last_name]
            default: created_at
          description: Field to sort by
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or email
      responses:
        '200':
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create user
      description: Create a new user in the deployment
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                phone_number:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{user_id}:
    patch:
      summary: Update user
      description: Update user profile information
      tags:
        - Users
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete user
      description: Permanently delete a user
      tags:
        - Users
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/details:
    get:
      summary: Get user details
      description: Get detailed information about a user including emails, phones, and social connections
      tags:
        - Users
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithDetails'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/password:
    patch:
      summary: Update user password
      description: Update a user's password
      tags:
        - Users
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Password updated successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/emails:
    post:
      summary: Add user email
      description: Add a new email address to a user's profile
      tags:
        - User Emails
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                is_primary:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Email added successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/emails/{email_id}:
    patch:
      summary: Update user email
      description: Update email primary status or verification
      tags:
        - User Emails
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: email_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_primary:
                  type: boolean
      responses:
        '200':
          description: Email updated successfully
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete user email
      description: Remove an email address from a user's profile
      tags:
        - User Emails
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: email_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Email deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/phones:
    post:
      summary: Add user phone
      description: Add a new phone number to a user's profile
      tags:
        - User Phones
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone_number
              properties:
                phone_number:
                  type: string
                is_primary:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Phone added successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/phones/{phone_id}:
    patch:
      summary: Update user phone
      description: Update phone primary status
      tags:
        - User Phones
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: phone_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_primary:
                  type: boolean
      responses:
        '200':
          description: Phone updated successfully
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete user phone
      description: Remove a phone number from a user's profile
      tags:
        - User Phones
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: phone_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Phone deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/social-connections/{connection_id}:
    delete:
      summary: Delete user social connection
      description: Remove a social account connection from a user
      tags:
        - User Social Connections
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Social connection removed successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations:
    get:
      summary: List invitations
      description: |
        Get a paginated list of pending user invitations.
      operationId: listInvitations
      tags:
      - Invitations
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Number of items to return per page
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Number of items to skip
      - name: sort_key
        in: query
        schema:
          type: string
          enum: [created_at, email]
          default: created_at
        description: Field to sort by
      - name: sort_order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order (ascending or descending)
      - name: search
        in: query
        schema:
          type: string
        description: Search query to filter results
      responses:
        '200':
          description: List of invitations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeploymentInvitation'
                  has_more:
                    type: boolean
                  limit:
                    type: integer
                    nullable: true
                  offset:
                    type: integer
                    nullable: true
                required:
                - data
                - has_more
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Invite user
      description: |
        Send an invitation to a new user.

        Creates an invitation with a unique token that can be used to sign up.
        The invitation expires after 7 days.
      operationId: inviteUser
      tags:
      - Invitations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - first_name
              - last_name
              - email_address
              properties:
                first_name:
                  type: string
                  description: Invitee's first name
                  example: Jane
                last_name:
                  type: string
                  description: Invitee's last name
                  example: Smith
                email_address:
                  type: string
                  format: email
                  description: Invitee's email address
                  example: jane.smith@example.com
      responses:
        '200':
          description: Invitation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentInvitation'
              examples:
                success:
                  summary: Invitation created
                  value:
                    id: "1111111111"
                    created_at: "2024-01-15T10:30:00Z"
                    updated_at: "2024-01-15T10:30:00Z"
                    deployment_id: "1234567890"
                    first_name: Jane
                    last_name: Smith
                    email_address: jane.smith@example.com
                    token: abc123def456
                    expiry: "2024-01-22T10:30:00Z"
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /invitations/{invitation_id}:
    delete:
      summary: Delete invitation
      description: |
        Delete a pending invitation.

        The invitation token will be invalidated and cannot be used for signup.
      operationId: deleteInvitation
      tags:
      - Invitations
      parameters:
      - name: invitation_id
        in: path
        required: true
        schema:
          type: string
        description: Invitation ID (integer as string)
        example: "1111111111"
      responses:
        '200':
          description: Invitation deleted successfully
          content:
            application/json:
              schema: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /waitlist:
    get:
      summary: List waitlist users
      description: |
        Get a paginated list of users on the waitlist.
      operationId: listWaitlist
      tags:
      - Waitlist
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Number of items to return per page
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Number of items to skip
      - name: sort_key
        in: query
        schema:
          type: string
          enum: [created_at, email]
          default: created_at
        description: Field to sort by
      - name: sort_order
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order (ascending or descending)
      - name: search
        in: query
        schema:
          type: string
        description: Search query to filter results
      responses:
        '200':
          description: List of waitlist users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeploymentWaitlistUser'
                  has_more:
                    type: boolean
                  limit:
                    type: integer
                    nullable: true
                  offset:
                    type: integer
                    nullable: true
                required:
                - data
                - has_more
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /waitlist/{waitlist_user_id}/approve:
    post:
      summary: Approve waitlist user
      description: |
        Approve a waitlist user and send them an invitation.

        Creates an invitation for the waitlist user's email address.
      operationId: approveWaitlistUser
      tags:
      - Waitlist
      parameters:
      - name: waitlist_user_id
        in: path
        required: true
        schema:
          type: string
        description: Waitlist user ID (integer as string)
        example: "3333333333"
      responses:
        '200':
          description: User approved and invitation sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentInvitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /session/tickets:
    post:
      summary: Generate session ticket
      description: |
        Generate a session ticket for backend-to-frontend authentication.

        Session tickets are used to securely authenticate a user session
        from your backend to the Wacht frontend.

        ### Ticket Types

        - **impersonation**: Impersonate a specific user (requires `user_id`)
        - **agent_access**: Grant access to specific AI agents (requires `agent_ids`)

        The ticket expires based on the `expires_in` parameter (default 5 minutes).
      operationId: createSessionTicket
      tags:
      - Session Tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ticket_type
              properties:
                ticket_type:
                  type: string
                  enum: [impersonation, agent_access]
                  description: Type of session ticket to generate
                user_id:
                  type: string
                  description: User ID (required for impersonation tickets)
                  example: "1234567890"
                agent_ids:
                  type: array
                  items:
                    type: string
                  description: List of agent IDs (required for agent_access 
                    tickets)
                  example: ["1111111111", "2222222222"]
                context_group:
                  type: string
                  description: Optional context group for the ticket
                  example: "support-session"
                expires_in:
                  type: integer
                  description: Expiration time in seconds - default is 300
                  example: 300
      responses:
        '200':
          description: Session ticket generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTicketResponse'
              examples:
                impersonation:
                  summary: Impersonation ticket
                  value:
                    ticket: wacht_st_ticket_abc123xyz789...
                    expires_at: 1705339500
                agentAccess:
                  summary: Agent access ticket
                  value:
                    ticket: wacht_st_ticket_def456uvw123...
                    expires_at: 1705339500
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingUserId:
                  summary: Missing user_id for impersonation
                  value:
                    message: "user_id is required for impersonation tickets"
                missingAgentIds:
                  summary: Missing agent_ids for agent_access
                  value:
                    message: "agent_ids is required for agent_access tickets"
                invalidType:
                  summary: Invalid ticket type
                  value:
                    message: "Invalid ticket_type. Must be 'impersonation' or 'agent_access'"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API key authentication (Bearer token)

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Resource not found"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Invalid request data"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Authentication required"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Internal server error"

  schemas:

    ErrorItem:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
      required:
        - message
        - code

    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'
      required:
        - errors

    # =====================================================
    # COMMON PAGINATED RESPONSES
    # =====================================================

    PaginatedResponse:
      type: object
      properties:
        has_more:
          type: boolean
          description: Whether there are more results
        limit:
          type: integer
          description: Page size
          nullable: true
        offset:
          type: integer
          description: Number of items skipped
          nullable: true

    PaginatedUsers:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UserWithIdentifiers'
          required:
            - data

    PaginatedWaitlistUsers:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DeploymentWaitlistUser'
          required:
            - data

    UserWithIdentifiers:
      type: object
      properties:
        id:
          type: string
          description: User ID (integer serialized as string)
          example: "1234567890"
        created_at:
          type: string
          format: date-time
          description: User creation timestamp
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-20T15:45:00Z"
        first_name:
          type: string
          description: User's first name
          example: John
        last_name:
          type: string
          description: User's last name
          example: Doe
        username:
          type: string
          description: User's username (nullable)
          nullable: true
          example: johndoe
        profile_picture_url:
          type: string
          description: URL to profile picture
          example: "https://cdn.wacht.dev/deployments/123/users/456/profile.jpg"
        primary_email_address:
          type: string
          description: Primary email address (nullable)
          nullable: true
          example: john.doe@example.com
        primary_phone_number:
          type: string
          description: Primary phone number with country code (nullable)
          nullable: true
          example: "+1234567890"
      required:
      - id
      - created_at
      - updated_at
      - first_name
      - last_name
      - profile_picture_url

    UserDetails:
      type: object
      properties:
        id:
          type: string
          description: User ID (integer serialized as string)
          example: "1234567890"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-20T15:45:00Z"
        first_name:
          type: string
          description: User's first name
          example: John
        last_name:
          type: string
          description: User's last name
          example: Doe
        username:
          type: string
          description: User's username (nullable)
          nullable: true
          example: johndoe
        profile_picture_url:
          type: string
          description: URL to profile picture
          example: "https://cdn.wacht.dev/deployments/123/users/456/profile.jpg"
        schema_version:
          type: string
          description: Schema version
          enum: [v1, v2]
          example: v2
        disabled:
          type: boolean
          description: Whether the user account is disabled
          example: false
        second_factor_policy:
          type: string
          description: Second factor authentication policy
          enum: [disabled, optional, required]
          example: disabled
        availability:
          type: string
          description: User availability status
          example: available
        last_password_reset_at:
          type: string
          format: date-time
          nullable: true
          description: Last password reset timestamp
          example: "2024-01-15T10:30:00Z"
        deployment_id:
          type: string
          description: Deployment ID (integer serialized as string)
          example: "1234567890"
        public_metadata:
          type: object
          description: Public metadata (custom fields)
          example: {}
        private_metadata:
          type: object
          description: Private metadata (custom fields, only accessible via 
            backend API)
          example: {}
        primary_email_address_id:
          type: string
          nullable: true
          description: Primary email ID
          example: "9876543210"
        primary_email_address:
          type: string
          format: email
          nullable: true
          description: Primary email address
          example: john.doe@example.com
        primary_phone_number_id:
          type: string
          nullable: true
          description: Primary phone ID
          example: "1111111111"
        primary_phone_number:
          type: string
          nullable: true
          description: Primary phone number with country code
          example: "+1234567890"
        active_organization_membership_id:
          type: string
          nullable: true
          description: Active organization membership ID
          example: "5555555555"
        active_workspace_membership_id:
          type: string
          nullable: true
          description: Active workspace membership ID
          example: "6666666666"
        has_password:
          type: boolean
          description: Whether the user has a password set
          example: true
        has_backup_codes:
          type: boolean
          description: Whether the user has backup codes generated
          example: false
        email_addresses:
          type: array
          description: All email addresses associated with the user
          items:
            $ref: '#/components/schemas/UserEmailAddress'
        phone_numbers:
          type: array
          description: All phone numbers associated with the user
          items:
            $ref: '#/components/schemas/UserPhoneNumber'
        social_connections:
          type: array
          description: All social connections associated with the user
          items:
            $ref: '#/components/schemas/SocialConnection'
        segments:
          type: array
          description: All segments the user belongs to
          items:
            $ref: '#/components/schemas/Segment'
      required:
      - id
      - created_at
      - updated_at
      - first_name
