components:
  parameters:
    WorkspaceId:
      name: id
      in: path
      required: true
      description: Workspace ID
      schema:
        type: string
        format: uint64
      example: "123456789012345678"

  schemas:
    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Workspace ID
          example: "123456789012345678"
        organization_id:
          type: string
          format: uint64
          description: Parent organization ID
          example: "999999999999999999"
        name:
          type: string
          description: Workspace name
          example: "Engineering"
        description:
          type: string
          description: Workspace description
          example: "Engineering team workspace"
        image_url:
          type: string
          format: uri
          description: Workspace logo URL
          example: "https://cdn.wacht.dev/workspaces/123/logo.png"
        whitelisted_ips:
          type: array
          items:
            type: string
          description: Allowed IP addresses/CIDR ranges
          example: ["192.168.1.0/24"]
        enable_ip_restriction:
          type: boolean
          description: Whether IP restriction is enabled
          example: false
        enforce_mfa:
          type: boolean
          description: Whether MFA is enforced
          example: false
        member_count:
          type: integer
          description: Number of members
          example: 42
        public_metadata:
          type: object
          description: Public metadata
          additionalProperties: true
          example: {"department": "Engineering"}
        private_metadata:
          type: object
          description: Private metadata (admin only)
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    WorkspaceMembership:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Membership ID
          example: "333333333333333333"
        workspace_id:
          type: string
          format: uint64
          description: Workspace ID
          example: "123456789012345678"
        organization_membership_id:
          type: string
          format: uint64
          description: Parent organization membership ID
          example: "777777777777777777"
        user_id:
          type: string
          format: uint64
          description: User ID
          example: "555555555555555555"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    WorkspaceMemberWithDetails:
      type: object
      properties:
        id:
          type: string
          format: uint64
          example: "333333333333333333"
        workspace_id:
          type: string
          format: uint64
          example: "123456789012345678"
        organization_membership_id:
          type: string
          format: uint64
          example: "777777777777777777"
        user_id:
          type: string
          format: uint64
          example: "555555555555555555"
        roles:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceRole'
          description: Member's roles
        user:
          type: object
          properties:
            id:
              type: string
              format: uint64
            first_name:
              type: string
            last_name:
              type: string
            email:
              type: string
              format: email
            username:
              type: string
            profile_picture_url:
              type: string
              format: uri
          description: User details
        public_metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceRole:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Role ID
          example: "444444444444444444"
        workspace_id:
          type: string
          format: uint64
          description: Workspace ID
          example: "123456789012345678"
        name:
          type: string
          description: Role name
          example: "Developer"
        permissions:
          type: array
          items:
            type: string
          description: Role permissions
          example: ["workspace:read", "workspace:write"]
        is_system_role:
          type: boolean
          description: Whether this is a system role
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SessionInfo:
      type: object
      description: Minimal session info included in every response
      nullable: true
      properties:
        id:
          type: string
          description: Session ID
          example: '123456789012345678'
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Session last update timestamp
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: INVALID_CREDENTIALS
        message:
          type: string
          description: Human-readable error message
          example: Invalid credentials. Please try again.
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session-based authentication using cookies
