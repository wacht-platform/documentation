# Execute agent in context endpoint

AIExecutionContextExecute:
  post:
    summary: Execute agent in context
    description: Queue an agent execution action in a specific execution context.
    tags:
      - AI Execution Contexts
    parameters:
      - $ref: '#/components/parameters/ExecutionContextId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - execution_type
            properties:
              agent_name:
                type: string
                description: Optional target agent name.
              execution_type:
                type: object
                description: Exactly one variant must be present.
                properties:
                  new_message:
                    type: object
                    required:
                      - message
                    properties:
                      message:
                        type: string
                      files:
                        type: array
                        items:
                          type: object
                          required:
                            - filename
                            - mime_type
                            - data
                          properties:
                            filename:
                              type: string
                            mime_type:
                              type: string
                            data:
                              type: string
                              description: Base64-encoded file bytes.
                  user_input_response:
                    type: object
                    required:
                      - message
                    properties:
                      message:
                        type: string
                  platform_function_result:
                    type: object
                    required:
                      - execution_id
                      - result
                    properties:
                      execution_id:
                        type: string
                      result:
                        type: object
                        additionalProperties: true
                  cancel:
                    type: object
                    additionalProperties: false
    responses:
      '200':
        description: Execution action queued or cancelled.
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [queued, cancelled]
                conversation_id:
                  type: string
      '400':
        $ref: '#/components/responses/BadRequest'
      '404':
        $ref: '#/components/responses/NotFound'
