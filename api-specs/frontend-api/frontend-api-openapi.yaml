components:
  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Session ID
          example: "123456789012345678"
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
          example: "2024-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Session last update timestamp
          example: "2024-01-15T10:30:00Z"
        signin_attempts:
          type: array
          items:
            $ref: '#/components/schemas/SignInAttempt'
          description: Sign-in attempts associated with this session
        signins:
          type: array
          items:
            $ref: '#/components/schemas/SignIn'
          description: Successful sign-ins associated with this session
        signup_attempts:
          type: array
          items:
            $ref: '#/components/schemas/SignupAttempt'
          description: Signup attempts associated with this session
        active_signin_id:
          type: string
          format: uint64
          description: ID of the active sign-in
          example: "987654321098765432"
        active_signin:
          $ref: '#/components/schemas/SignIn'
          description: Active sign-in details

    SignInAttempt:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Sign-in attempt ID
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SignIn:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Sign-in ID
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SignupAttempt:
      type: object
      properties:
        id:
          type: string
          format: uint64
          description: Signup attempt ID
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SessionInfo:
      type: object
      description: Minimal session info included in every response
      nullable: true
      properties:
        id:
          type: string
          description: Session ID
          example: '123456789012345678'
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Session last update timestamp
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: INVALID_CREDENTIALS
        message:
          type: string
          description: Human-readable error message
          example: Invalid credentials. Please try again.
