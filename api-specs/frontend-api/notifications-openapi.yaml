          type: string
          format: uint64
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                starred:
                  type: boolean
                  description: Star status
      responses:
        '200':
          description: Notification starred status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
