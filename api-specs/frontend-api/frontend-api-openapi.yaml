  /auth/oauth2/init:
    post:
      tags:
      - Authentication
      summary: Initialize OAuth2 flow
      description: Initialize OAuth2/OIDC authentication with external provider
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - provider
              properties:
                provider:
                  type: string
                  description: OAuth2 provider (google, github, etc.)
                  example: "google"
                redirect_url:
                  type: string
                  format: uri
                  description: URL to redirect to after authentication
                  example: "https://app.example.com/auth/callback"
      responses:
        '200':
          description: OAuth2 URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 200
                  message:
                    type: string
                    description: Response message (empty on success)
                    example: ''
                  data:
                    type: object
                    properties:
                      oauth_url:
                        type: string
                        format: uri
                        example: "https://accounts.google.com/o/oauth2/v2/auth?..."
                      session:
                        $ref: '#/components/schemas/Session'
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    nullable: true
                    description: Error details (null on success)
        '400':
          description: Bad request - Invalid provider

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Bad request - Invalid provider
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
  /auth/oauth2/callback:
    get:
      tags:
      - Authentication
      summary: OAuth2 callback
      description: Handle OAuth2/OIDC callback from external provider
      parameters:
      - name: code
        in: query
        description: OAuth2 authorization code
        schema:
          type: string
      - name: state
        in: query
        description: OAuth2 state parameter
        schema:
          type: string
      - name: provider
        in: query
        description: OAuth2 provider
        schema:
          type: string
      responses:
        '302':
          description: Redirect to application
        '400':
          description: Bad request - Invalid callback
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 400
                  message:
                    type: string
                    description: Bad request - Invalid callback
                  data:
                    nullable: true
                    description: Additional error context (may be null)
                  session:
                    $ref: '#/components/schemas/SessionInfo'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorDetail'
                    description: Structured error details
        '401':
          description: Unauthorized - Invalid OAuth credentials

          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: HTTP status code
                    example: 401
                  message:
                    type: string
                    description: Unauthorized - Invalid OAuth credentials
                  data:
